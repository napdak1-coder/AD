<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NOBLECOCO 일본어</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400;600&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
:root{--ink:#1a1410;--paper:#f7f3ee;--red:#c0392b;--red-light:#fdf0ee;--gold:#b5890a;--muted:#7a6f65;--border:#d9cfc5;--card:#ffffff;--shadow:rgba(26,20,16,0.08);--green:#1a7a4a;--green-light:#eef7f2;--blue:#1a4a8a;--blue-light:#eef2fa;--purple:#6a1a8a;--purple-light:#f5eefa;--orange:#b55a10;--orange-light:#fdf3ee;}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{background:var(--paper);color:var(--ink);font-family:'Noto Sans KR',sans-serif;padding:20px 14px 60px;font-size:15px;}
header{text-align:center;margin-bottom:20px;}
h1{font-family:'Noto Serif JP',serif;font-size:20px;font-weight:600;line-height:1.4;}
h1 span{display:block;font-size:11px;font-family:'Noto Sans KR',sans-serif;font-weight:300;color:var(--muted);letter-spacing:.1em;margin-top:4px;}
.tabs{display:flex;gap:4px;border-bottom:2px solid var(--border);margin-bottom:20px;}
.tab-btn{flex:1;padding:9px 2px;border:none;background:none;font-family:'Noto Sans KR',sans-serif;font-size:11px;font-weight:500;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px;border-radius:6px 6px 0 0;transition:all .2s;}
.tab-btn.active{color:var(--red);border-bottom-color:var(--red);background:var(--red-light);}
.tab-panel{display:none;}
.tab-panel.active{display:block;}
/* TRANSLATE */
.translate-box{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:16px;margin-bottom:14px;box-shadow:0 2px 8px var(--shadow);}
.t-label{font-size:11px;font-weight:700;letter-spacing:.12em;color:var(--muted);text-transform:uppercase;margin-bottom:8px;}
.translate-input{width:100%;border:1.5px solid var(--border);border-radius:10px;padding:12px;font-family:'Noto Sans KR',sans-serif;font-size:15px;color:var(--ink);background:var(--paper);outline:none;resize:none;transition:border-color .2s;line-height:1.6;}
.translate-input:focus{border-color:var(--red);}
.translate-btn{margin-top:12px;width:100%;padding:13px;border:none;border-radius:10px;background:var(--red);color:#fff;font-family:'Noto Sans KR',sans-serif;font-size:14px;font-weight:600;cursor:pointer;-webkit-appearance:none;}
.translate-btn:disabled{background:var(--border);cursor:not-allowed;}
.translate-result{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:16px;margin-bottom:14px;box-shadow:0 2px 8px var(--shadow);}
.result-jp{font-family:'Noto Serif JP',serif;font-size:22px;color:var(--red);line-height:1.7;margin-bottom:4px;word-break:break-all;}
.result-rom{font-size:13px;color:var(--muted);font-style:italic;line-height:1.8;}
.t-actions{display:flex;gap:8px;margin-top:14px;align-items:center;flex-wrap:wrap;}
.play-btn{display:inline-flex;align-items:center;gap:5px;padding:9px 20px;border:none;border-radius:20px;background:var(--red);color:#fff;font-family:'Noto Sans KR',sans-serif;font-size:13px;font-weight:500;cursor:pointer;-webkit-appearance:none;}
.play-btn.playing{background:var(--green);}
.speed-tog{padding:8px 14px;border-radius:20px;border:1px solid var(--border);background:var(--paper);font-size:12px;color:var(--muted);cursor:pointer;font-family:'Noto Sans KR',sans-serif;}
.t-tip{margin-top:10px;font-size:11.5px;color:var(--muted);line-height:1.7;padding:8px 10px;background:var(--paper);border-radius:8px;border-left:3px solid var(--gold);}
.t-loading{text-align:center;padding:28px;color:var(--muted);font-size:13px;display:flex;align-items:center;justify-content:center;gap:10px;}
.spinner{width:18px;height:18px;border:2px solid var(--border);border-top-color:var(--red);border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0;}
@keyframes spin{to{transform:rotate(360deg);}}
/* SEARCH */
.search-wrap{position:relative;margin-bottom:12px;}
.search-input{width:100%;padding:11px 38px 11px 14px;border-radius:12px;border:1.5px solid var(--border);background:var(--card);font-family:'Noto Sans KR',sans-serif;font-size:14px;color:var(--ink);outline:none;transition:border-color .2s;box-shadow:0 2px 6px var(--shadow);}
.search-input:focus{border-color:var(--red);}
.search-clear{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--muted);font-size:17px;cursor:pointer;display:none;padding:0;}
.search-count{font-size:11px;color:var(--muted);margin-bottom:10px;}
.search-results{display:none;}
.search-results.active{display:block;}
.src-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:13px;margin-bottom:9px;box-shadow:0 2px 5px var(--shadow);position:relative;overflow:hidden;}
.src-card::before{content:'';position:absolute;top:0;left:0;width:3px;height:100%;background:var(--gold);}
.r-type{font-size:9px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;padding:2px 7px;border-radius:10px;display:inline-block;margin-bottom:5px;}
.r-type.phrase{background:var(--red-light);color:var(--red);}
.r-type.word{background:var(--blue-light);color:var(--blue);}
mark{background:#fff3cd;color:var(--ink);border-radius:2px;padding:0 1px;}
.no-results{text-align:center;padding:36px 20px;color:var(--muted);font-size:13px;}
/* PHRASE */
.voice-status{text-align:center;margin-bottom:14px;padding:8px 14px;border-radius:8px;font-size:12px;font-weight:500;}
.voice-status.ok{background:var(--green-light);color:var(--green);}
.voice-status.warn{background:#fff8e1;color:#8a6d00;}
.g-ctrl{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px;padding:12px;background:var(--card);border:1px solid var(--border);border-radius:10px;align-items:center;}
.g-ctrl label{font-size:12px;font-weight:500;color:var(--muted);}
.speed-sel{padding:6px 10px;border-radius:8px;border:1px solid var(--border);background:var(--paper);font-family:'Noto Sans KR',sans-serif;font-size:12px;color:var(--ink);}
.all-btn{padding:7px 14px;border-radius:20px;border:none;background:var(--ink);color:#fff;font-family:'Noto Sans KR',sans-serif;font-size:12px;font-weight:500;cursor:pointer;}
.stop-btn{padding:7px 12px;border-radius:20px;border:1px solid var(--border);background:var(--paper);color:var(--muted);font-family:'Noto Sans KR',sans-serif;font-size:12px;cursor:pointer;}
.sec-lbl{display:flex;align-items:center;gap:8px;margin:18px 0 9px;}
.sec-lbl span{font-size:10px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--red);white-space:nowrap;}
.sec-lbl::after{content:'';flex:1;height:1px;background:var(--border);}
.p-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:13px 13px 11px;margin-bottom:9px;box-shadow:0 2px 5px var(--shadow);position:relative;overflow:hidden;}
.p-card::before{content:'';position:absolute;top:0;left:0;width:3px;height:100%;background:var(--border);}
.p-cat{font-size:10px;font-weight:700;letter-spacing:.12em;color:var(--muted);text-transform:uppercase;margin-bottom:4px;}
.p-kr{font-size:14px;font-weight:500;color:var(--ink);line-height:1.5;margin-bottom:7px;}
.p-div{height:1px;background:var(--border);margin-bottom:7px;}
.p-jp{font-family:'Noto Serif JP',serif;font-size:16px;color:var(--red);line-height:1.6;margin-bottom:3px;}
.p-rom{font-size:11px;color:var(--muted);font-style:italic;margin-bottom:9px;}
.pb-btn{display:inline-flex;align-items:center;gap:4px;padding:6px 14px;border:none;border-radius:20px;background:var(--red);color:#fff;font-family:'Noto Sans KR',sans-serif;font-size:12px;font-weight:500;cursor:pointer;-webkit-appearance:none;}
.pb-btn.playing{background:var(--green);}
.now-pl{font-size:11px;color:var(--muted);margin-top:5px;text-align:center;}
/* VOCAB */
.v-intro{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:11px 13px;margin-bottom:14px;font-size:12px;line-height:1.8;color:var(--muted);}
.v-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:13px 15px;margin-bottom:9px;box-shadow:0 1px 5px var(--shadow);}
.v-top{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:5px;}
.v-jp{font-family:'Noto Serif JP',serif;font-size:20px;color:var(--ink);}
.v-badge{font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;padding:3px 7px;border-radius:20px;white-space:nowrap;flex-shrink:0;margin-top:3px;}
.type-noun{background:var(--blue-light);color:var(--blue);}
.type-verb{background:var(--green-light);color:var(--green);}
.type-adj{background:var(--purple-light);color:var(--purple);}
.type-adv{background:var(--orange-light);color:var(--orange);}
.type-particle{background:#f3f3f3;color:#555;}
.type-phrase{background:var(--red-light);color:var(--red);}
.type-counter{background:#fff8e1;color:#8a6d00;}
.v-read{font-size:11px;color:var(--muted);margin-bottom:4px;font-style:italic;}
.v-kr{font-size:13px;font-weight:500;color:var(--ink);margin-bottom:5px;}
.v-note{font-size:11.5px;color:var(--muted);line-height:1.6;}
.v-src{font-size:10px;color:var(--border);margin-top:7px;border-top:1px solid var(--border);padding-top:5px;}
.v-src span{color:var(--muted);}
.vp-btn{display:inline-flex;align-items:center;gap:4px;margin-top:7px;padding:5px 11px;border-radius:20px;border:1px solid var(--border);background:var(--paper);font-size:11px;color:var(--muted);cursor:pointer;font-family:'Noto Sans KR',sans-serif;-webkit-appearance:none;}
/* WORD BREAKDOWN */
.wb-title{font-size:11px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-bottom:10px;}
.wb-card{background:var(--paper);border:1px solid var(--border);border-radius:10px;padding:11px 13px;margin-bottom:8px;}
.wb-top{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:4px;}
.wb-jp{font-family:'Noto Serif JP',serif;font-size:18px;color:var(--ink);}
.wb-read{font-size:11px;color:var(--muted);font-style:italic;margin-bottom:3px;}
.wb-kr{font-size:13px;font-weight:500;color:var(--ink);margin-bottom:4px;}
.wb-note{font-size:11px;color:var(--muted);margin-bottom:4px;}
.wb-empty{font-size:12px;color:var(--muted);text-align:center;padding:14px 0;}
/* QUIZ */
.q-ctrl{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;}
.q-sel{flex:1;padding:8px 10px;border-radius:10px;border:1px solid var(--border);background:var(--paper);font-family:'Noto Sans KR',sans-serif;font-size:13px;}
.q-start{padding:8px 16px;border-radius:20px;border:none;background:var(--red);color:#fff;font-family:'Noto Sans KR',sans-serif;font-size:13px;font-weight:600;cursor:pointer;-webkit-appearance:none;}
.q-box{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:22px 14px;text-align:center;box-shadow:0 2px 10px var(--shadow);min-height:230px;display:flex;flex-direction:column;justify-content:center;}
.q-prompt{font-size:12px;color:var(--muted);margin-bottom:12px;}
.q-ques{font-size:16px;font-weight:500;color:var(--ink);margin-bottom:18px;line-height:1.6;}
.q-ques.jp{font-family:'Noto Serif JP',serif;font-size:21px;color:var(--red);}
.q-opts{display:grid;grid-template-columns:1fr 1fr;gap:8px;max-width:400px;margin:0 auto;}
.q-opt{padding:10px;border-radius:10px;border:1.5px solid var(--border);background:var(--paper);font-family:'Noto Sans KR',sans-serif;font-size:12px;cursor:pointer;text-align:left;-webkit-appearance:none;}
.q-opt.correct{border-color:var(--green);background:var(--green-light);color:var(--green);font-weight:600;}
.q-opt.wrong{border-color:var(--red);background:var(--red-light);color:var(--red);}
.q-fb{margin-top:14px;font-size:13px;font-weight:500;padding:8px 14px;border-radius:8px;display:inline-block;}
.q-fb.correct{background:var(--green-light);color:var(--green);}
.q-fb.wrong{background:var(--red-light);color:var(--red);}
.q-next{margin-top:10px;padding:8px 18px;border-radius:20px;border:none;background:var(--ink);color:#fff;font-family:'Noto Sans KR',sans-serif;font-size:13px;font-weight:500;cursor:pointer;display:none;-webkit-appearance:none;}
.q-next.on{display:inline-block;}
</style>
</head>
<body>
<header>
  <h1>🛍️ NOBLECOCO 일본어 학습<span>接客フレーズ · 翻訳 · 音声</span></h1>
</header>

<div class="tabs" id="mainTabs">
  <button class="tab-btn active" onclick="switchTab('translate',this)">✍️ 번역</button>
  <button class="tab-btn" onclick="switchTab('phrases',this)">🎧 회화</button>
  <button class="tab-btn" onclick="switchTab('vocab',this)">📖 단어</button>
  <button class="tab-btn" onclick="switchTab('quiz',this)">🎯 퀴즈</button>
</div>

<!-- 번역 탭 -->
<div id="tab-translate" class="tab-panel active">
  <div class="translate-box">
    <div class="t-label">한국어 입력</div>
    <textarea id="krInput" class="translate-input" placeholder="예: 100만원입니다&#10;잘 어울리세요&#10;감사합니다..." rows="3"></textarea>
    <button class="translate-btn" id="translateBtn" onclick="doTranslate()">🔄 일본어로 번역 + 음성 재생</button>
  </div>
  <div class="t-loading" id="tLoading" style="display:none"><div class="spinner"></div> 번역 중...</div>
  <div class="translate-result" id="tResult" style="display:none">
    <div class="t-label">일본어</div>
    <div class="result-jp" id="rJp"></div>
    <div class="t-label" style="margin-top:12px">발음 (한글)</div>
    <div class="result-rom" id="rRom"></div>
    <div class="t-actions">
      <button class="play-btn" id="ttsBtn" onclick="playTranslated()">▶ 다시 듣기</button>
      <button class="speed-tog" onclick="cycleSpeed()">속도: <span id="speedLabel">보통</span></button>
    </div>
    <div class="t-tip" id="tTip" style="display:none"></div>
    <div id="wordBreakdown" style="margin-top:14px"></div>
  </div>
</div>

<!-- 회화 탭 -->
<div id="tab-phrases" class="tab-panel">
  <div class="search-wrap">
    <input class="search-input" id="searchInput" type="text" placeholder="🔍 회화/단어 검색..." oninput="handleSearch(this.value)"/>
    <button class="search-clear" id="searchClear" onclick="clearSearch()">✕</button>
  </div>
  <div class="search-count" id="searchCount"></div>
  <div class="search-results" id="searchResults"></div>
  <div id="phraseMain">
    <div id="voiceStatus" class="voice-status warn">🔄 음성 준비 중...</div>
    <div class="g-ctrl">
      <label>속도</label>
      <select class="speed-sel" id="globalSpeed" onchange="globalSpeed=parseFloat(this.value)">
        <option value="0.6">🐢 느리게</option>
        <option value="0.8">🚶 보통느리게</option>
        <option value="1.0" selected>▶️ 보통</option>
        <option value="1.2">🏃 빠르게</option>
      </select>
      <button class="all-btn" onclick="playAll()">▶ 전체듣기</button>
      <button class="stop-btn" onclick="stopAll()">⏹ 정지</button>
    </div>
    <div class="now-pl" id="nowPlaying"></div>
    <div id="phraseSections"></div>
  </div>
</div>

<!-- 단어 탭 -->
<div id="tab-vocab" class="tab-panel">
  <div class="v-intro">각 문장의 핵심 단어를 품사별로 분류했어요. 발음 버튼으로 들을 수 있어요!</div>
  <div id="vocabGrid"></div>
</div>

<!-- 퀴즈 탭 -->
<div id="tab-quiz" class="tab-panel">
  <div class="q-ctrl">
    <select class="q-sel" id="quizMode">
      <option value="jp2kr">🇯🇵 일본어 → 한국어</option>
      <option value="kr2jp">🇰🇷 한국어 → 일본어</option>
      <option value="audio">🎧 음성 → 한국어</option>
    </select>
    <button class="q-start" onclick="startQuiz()">시작</button>
  </div>
  <div class="q-box" id="quizBox">
    <div class="q-prompt">모드 선택 후 시작을 누르세요</div>
    <div class="q-ques">문제가 여기에 표시됩니다</div>
  </div>
</div>

<script>
const sections=[{label:"인사 · 응대",phrases:[{cat:"인사/인원",kr:"어서 오세요, 두 분이신가요?",jp:"いらっしゃいませ、お二人様ですか？",rom:"이랏샤이마세, 오후타리사마데스카?"},{cat:"배웅 인사",kr:"안녕히 가세요",jp:"お気をつけて",rom:"오키오츠케테"}]},{label:"피팅 · 제품",phrases:[{cat:"피팅 제안",kr:"한번 입어보세요",jp:"試着してみてください",rom:"시차쿠 시테미테 쿠다사이"},{cat:"제품 추천",kr:"잘 어울려요",jp:"似合っています",rom:"니아엣테이마스"},{cat:"재고 안내",kr:"다른 사이즈도 있어요",jp:"他のサイズもあります",rom:"호카노 사이즈모 아리마스"},{cat:"사이즈 안내",kr:"오트리는 10단위로 나와요",jp:"オートリーは10単位で出ています",rom:"오-토리-와 쥬-탄이데 데테이마스"}]},{label:"가격 · 결제",phrases:[{cat:"가격 안내",kr:"스톤아일랜드 저렴해요",jp:"ストーンアイランド、安いです",rom:"스토-온 아이란도, 야스이데스"},{cat:"가격 이유",kr:"일본보다 훨씬 싸요",jp:"日本よりずっと安いです",rom:"니혼요리 즛토 야스이데스"},{cat:"결제 확인",kr:"구매하시는 건가요?",jp:"こちらにされますか？",rom:"코치라니 사레마스카?"}]},{label:"칭찬 필살기 💘",phrases:[{cat:"특별 칭찬",kr:"봤던 일본 사람 중 가장 예뻐요",jp:"今まで会った日本人の中で一番綺麗です",rom:"이마마데 앗타 니혼진노 나카데 이치반 키레이데스"},{cat:"남성 칭찬",kr:"정말 잘생기셨어요",jp:"本当にカッコいいですね！",rom:"혼토-니 칵코이이데스네!"},{cat:"함께 칭찬",kr:"두 분 다 너무 예뻐요!",jp:"お二人とも、とても綺麗です！",rom:"오후타리토모, 토테모 키레이데스!"},{cat:"외모 칭찬",kr:"얼굴이 정말 작으시네요!",jp:"顔がとても小さいですね！",rom:"카오가 토테모 치이사이데스네!"},{cat:"피부 칭찬",kr:"피부가 정말 깨끗해요!",jp:"肌がとても綺麗です！",rom:"하다가 토테모 키레이데스!"},{cat:"스타일 칭찬",kr:"옷이랑 스타일이 너무 좋아요!",jp:"服もスタイルもとても良いです！",rom:"후쿠모 스타이루모 토테모 이이데스!"},{cat:"강조하기",kr:"아니요, 진짜예요!",jp:"いいえ、本当ですよ！",rom:"이이에, 혼토-데스요!"}]}];

// TTS
let synth=window.speechSynthesis,jpVoice=null,globalSpeed=1.0;
let isPlayingAll=false,playQueue=[],qIdx=0;
const speeds=[{v:0.6,l:'느리게'},{v:0.8,l:'보통느리게'},{v:1.0,l:'보통'},{v:1.2,l:'빠르게'}];
let spdIdx=2;

function findVoice(){
  const v=synth.getVoices().filter(v=>v.lang&&v.lang.startsWith('ja'));
  if(v.length>0){
    jpVoice=v.find(x=>x.name.includes('Kyoko')||x.name.includes('O-ren')||x.name.includes('Otoya'))||v[0];
    const el=document.getElementById('voiceStatus');
    if(el){el.textContent='✅ 일본어 음성 준비 완료 ('+jpVoice.name+')';el.className='voice-status ok';}
  }else{
    const el=document.getElementById('voiceStatus');
    if(el){el.textContent='⚠️ 설정 > 손쉬운 사용 > 스피치 > 목소리 > 일본어 설치';el.className='voice-status warn';}
  }
}
synth.onvoiceschanged=findVoice;setTimeout(findVoice,600);

function speak(text,rate,cb){
  synth.cancel();
  const u=new SpeechSynthesisUtterance(text);
  u.lang='ja-JP';u.rate=rate||globalSpeed;
  if(jpVoice)u.voice=jpVoice;
  if(cb)u.onend=cb;
  synth.speak(u);
}
function stopAll(){synth.cancel();isPlayingAll=false;const np=document.getElementById('nowPlaying');if(np)np.textContent='';}
function playAll(){
  stopAll();isPlayingAll=true;playQueue=[];
  sections.forEach(s=>s.phrases.forEach(p=>playQueue.push(p)));qIdx=0;playNext();
}
function playNext(){
  if(!isPlayingAll||qIdx>=playQueue.length){isPlayingAll=false;const np=document.getElementById('nowPlaying');if(np)np.textContent='';return;}
  const p=playQueue[qIdx];
  const np=document.getElementById('nowPlaying');if(np)np.textContent='▶ '+p.cat+': '+p.kr;
  speak(p.jp,globalSpeed,()=>{qIdx++;setTimeout(playNext,700);});
}
function playCard(jp,id){
  synth.cancel();
  const b=document.getElementById(id);
  if(b){b.textContent='🔊 재생 중...';b.classList.add('playing');}
  const u=new SpeechSynthesisUtterance(jp);
  u.lang='ja-JP';u.rate=globalSpeed;if(jpVoice)u.voice=jpVoice;
  u.onend=()=>{if(b){b.textContent='▶ 듣기';b.classList.remove('playing');}};
  synth.speak(u);
}

function jpToKr(text){
  let result = '';
  let i = 0;
  while(i < text.length){
    // 2자 조합 먼저 체크
    const two = text.slice(i, i+2);
    if(JP2KR[two]){
      result += JP2KR[two];
      i += 2;
    } else {
      const one = text[i];
      if(JP2KR[one]){
        // っ/ッ 처리 (다음 자음 앞에 받침)
        if(one === 'っ' || one === 'ッ'){
          const next2 = text.slice(i+1, i+3);
          const next1 = text[i+1];
          const nextKr = JP2KR[next2] || JP2KR[next1] || '';
          if(nextKr) result += nextKr[0];
          else result += '';
        }
        // ン/ん 처리
        else if(one === 'ン' || one === 'ん'){
          result += '은';
        }
        // ー 처리 (장음)
        else if(one === 'ー'){
          result += '-';
        }
        else {
          result += JP2KR[one];
        }
      } else {
        result += one;
      }
      i++;
    }
  }
  return result;
}

// 번역 (Google 무료 API — 발음 + 단어 설명 포함)
let lastJp='';
async function doTranslate(){
  const input=document.getElementById('krInput').value.trim();
  if(!input)return;
  const btn=document.getElementById('translateBtn');
  const loading=document.getElementById('tLoading');
  const result=document.getElementById('tResult');
  btn.disabled=true;loading.style.display='flex';result.style.display='none';
  try{
    // Google 비공식 API (키 불필요, 발음+번역 동시)
    const url='https://translate.googleapis.com/translate_a/single?client=gtx&sl=ko&tl=ja&dt=t&dt=rm&dt=bd&q='+encodeURIComponent(input);
    const res=await fetch(url);
    const data=await res.json();

    // 번역 결과
    const jp=data[0].map(seg=>seg[0]).join('');
    if(!jp)throw new Error('no translation');
    lastJp=jp;
    document.getElementById('rJp').textContent=jp;

    // 발음 (로마자 → 한글 근사 표기)
    // 발음: jpToKr 변환 항상 적용 (Google 로마자는 보조)
    const krPronun = jpToKr(jp);
    document.getElementById('rRom').textContent = krPronun || '▶ 버튼으로 발음을 들어보세요';

    // 단어 설명 카드 생성
    const wordBox=document.getElementById('wordBreakdown');
    wordBox.innerHTML='';
    let wordsFound=[];

    // 1) vocab DB에서 매칭
    vocab.forEach(v=>{
      if(jp.includes(v.jp)){
        wordsFound.push(v);
      }
    });

    // 2) Google 사전 데이터(bd)에서 추가 단어
    if(data[1]&&Array.isArray(data[1])){
      data[1].forEach(entry=>{
        const pos=entry[0]||'';
        const words=entry[1]||[];
        words.forEach(w=>{
          // 이미 vocab에 있으면 스킵
          if(!wordsFound.find(v=>v.jp===w)){
            if(jp.includes(w)&&w.length>1){
              wordsFound.push({jp:w,kr:entry[2]&&entry[2][0]?entry[2][0][0]:'',reading:'',type:'phrase',note:pos?'품사: '+pos:'',source:jp});
            }
          }
        });
      });
    }

    if(wordsFound.length>0){
      const tl={noun:'명사',verb:'동사',adj:'형용사',adv:'부사',particle:'조사',phrase:'표현',counter:'접미사'};
      wordBox.innerHTML='<div class="wb-title">📚 단어 분석</div>'
        +wordsFound.map(v=>`
        <div class="wb-card">
          <div class="wb-top">
            <span class="wb-jp">${v.jp}</span>
            <span class="v-badge type-${v.type}">${tl[v.type]||v.type}</span>
          </div>
          ${v.reading?`<div class="wb-read">${v.reading}</div>`:''}
          <div class="wb-kr">${v.kr}</div>
          ${v.note?`<div class="wb-note">${v.note}</div>`:''}
          <button class="vp-btn" onclick="speak('${v.jp.replace(/'/g,"\\'")}')">▶ 발음</button>
        </div>`).join('');
    } else {
      wordBox.innerHTML='<div class="wb-empty">단어 분석 결과가 없어요. 회화/단어 탭에서 관련 표현을 찾아보세요!</div>';
    }

    const tip=document.getElementById('tTip');
    tip.textContent='💡 발음이 궁금하면 속도를 🐢 느리게 설정하고 들어보세요!';
    tip.style.display='block';
    result.style.display='block';
    setTimeout(()=>playTranslated(),400);
  }catch(e){
    alert('번역 오류가 발생했어요.\n인터넷 연결을 확인하고 다시 시도해주세요.');
  }finally{
    btn.disabled=false;loading.style.display='none';
  }
}
function playTranslated(){
  if(!lastJp)return;
  const b=document.getElementById('ttsBtn');
  b.textContent='🔊 재생 중...';b.classList.add('playing');
  const u=new SpeechSynthesisUtterance(lastJp);
  u.lang='ja-JP';u.rate=speeds[spdIdx].v;if(jpVoice)u.voice=jpVoice;
  u.onend=()=>{b.textContent='▶ 다시 듣기';b.classList.remove('playing');};
  synth.cancel();synth.speak(u);
}
function cycleSpeed(){
  spdIdx=(spdIdx+1)%speeds.length;
  document.getElementById('speedLabel').textContent=speeds[spdIdx].l;
}

});

function hl(text,q){if(!q)return text;const e=q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');return text.replace(new RegExp(e,'gi'),m=>'<mark>'+m+'</mark>');}
function handleSearch(q){
  const t=q.trim();
  const res=document.getElementById('searchResults');
  const cnt=document.getElementById('searchCount');
  const clr=document.getElementById('searchClear');
  const main=document.getElementById('phraseMain');
  clr.style.display=t?'block':'none';
  if(!t){res.classList.remove('active');res.innerHTML='';cnt.textContent='';main.style.display='block';return;}
  main.style.display='none';
  const results=[];
  sections.forEach(sec=>sec.phrases.forEach(p=>{
    if(p.kr.includes(t)||p.jp.includes(t)||p.rom.includes(t)||p.cat.includes(t))results.push({type:'phrase',data:p});
  }));
  vocab.forEach(v=>{
    if(v.jp.includes(t)||v.kr.includes(t)||v.reading.includes(t)||v.note.includes(t))results.push({type:'word',data:v});
  });
  cnt.textContent=results.length>0?'검색 결과 '+results.length+'개':'';
  if(!results.length){res.innerHTML='<div class="no-results">🔍 검색 결과가 없어요.</div>';res.classList.add('active');return;}
  const tl={noun:'명사',verb:'동사',adj:'형용사',adv:'부사',particle:'조사',phrase:'표현',counter:'접미사'};
  res.innerHTML=results.map((r,i)=>{
    if(r.type==='phrase'){const p=r.data,id='sr'+i;
      return '<div class="src-card"><span class="r-type phrase">회화</span>'
        +'<div style="font-size:10px;color:var(--muted);margin-bottom:3px">'+hl(p.cat,t)+'</div>'
        +'<div style="font-size:14px;font-weight:500;margin-bottom:5px">'+hl(p.kr,t)+'</div>'
        +'<div style="font-family:Noto Serif JP,serif;font-size:16px;color:var(--red);margin-bottom:2px">'+hl(p.jp,t)+'</div>'
        +'<div style="font-size:11px;color:var(--muted);font-style:italic;margin-bottom:8px">'+hl(p.rom,t)+'</div>'
        +'<button class="pb-btn" id="'+id+'" onclick="playCard(\''+p.jp.replace(/'/g,"\\'")+'\',\''+id+'\')">▶ 듣기</button></div>';}
    else{const v=r.data;
      return '<div class="src-card"><span class="r-type word">단어</span>'
        +'<div style="display:flex;justify-content:space-between;margin-bottom:4px">'
        +'<div style="font-family:Noto Serif JP,serif;font-size:19px">'+hl(v.jp,t)+'</div>'
        +'<span class="v-badge type-'+v.type+'">'+tl[v.type]+'</span></div>'
        +'<div style="font-size:11px;color:var(--muted);font-style:italic;margin-bottom:3px">'+hl(v.reading,t)+'</div>'
        +'<div style="font-size:13px;font-weight:500;margin-bottom:5px">'+hl(v.kr,t)+'</div>'
        +'<div style="font-size:11.5px;color:var(--muted)">'+hl(v.note,t)+'</div>'
        +'<button class="vp-btn" onclick="speak(\''+v.jp.replace(/'/g,"\\'")+'\')">▶ 발음</button></div>';}
  }).join('');
  res.classList.add('active');
}
function clearSearch(){document.getElementById('searchInput').value='';handleSearch('');}

// 렌더링
const TL={noun:'명사',verb:'동사',adj:'형용사',adv:'부사',particle:'조사',phrase:'표현',counter:'접미사'};
function renderPhrases(){
  const c=document.getElementById('phraseSections');c.innerHTML='';
  sections.forEach((sec,si)=>{
    const l=document.createElement('div');l.className='sec-lbl';l.innerHTML='<span>'+sec.label+'</span>';c.appendChild(l);
    sec.phrases.forEach((p,pi)=>{
      const id='pb-'+si+'-'+pi;
      const card=document.createElement('div');card.className='p-card';
      card.innerHTML='<div class="p-cat">'+p.cat+'</div><div class="p-kr">'+p.kr+'</div><div class="p-div"></div>'
        +'<div class="p-jp">'+p.jp+'</div><div class="p-rom">'+p.rom+'</div>'
        +'<button class="pb-btn" id="'+id+'" onclick="playCard(\''+p.jp.replace(/'/g,"\\'")+'\',' +'\''+id+'\')">▶ 듣기</button>';
      c.appendChild(card);
    });
  });
}
function renderVocab(){
  const g=document.getElementById('vocabGrid');g.innerHTML='';
  vocab.forEach(v=>{
    const card=document.createElement('div');card.className='v-card';
    card.innerHTML='<div class="v-top"><div class="v-jp">'+v.jp+'</div><span class="v-badge type-'+v.type+'">'+TL[v.type]+'</span></div>'
      +'<div class="v-read">'+v.reading+'</div><div class="v-kr">'+v.kr+'</div><div class="v-note">'+v.note+'</div>'
      +'<div class="v-src">출처: <span>'+v.source+'</span></div>'
      +'<button class="vp-btn" onclick="speak(\''+v.jp.replace(/'/g,"\\'")+'\')">▶ 발음</button>';
    g.appendChild(card);
  });
}

// 퀴즈
let allP=[];sections.forEach(s=>s.phrases.forEach(p=>allP.push(p)));
let qScore=0,qTotal=0,qCur=null,qAns=false;
function startQuiz(){qScore=0;qTotal=0;nextQ();}
function nextQ(){
  qAns=false;
  const mode=document.getElementById('quizMode').value;
  const idx=Math.floor(Math.random()*allP.length);qCur=allP[idx];
  let pool=allP.filter((_,i)=>i!==idx),wrongs=[];
  while(wrongs.length<3&&pool.length>0){const wi=Math.floor(Math.random()*pool.length);wrongs.push(pool.splice(wi,1)[0]);}
  let qH='',opts=[];
  if(mode==='jp2kr'){qH='<div class="q-ques jp">'+qCur.jp+'</div><div style="color:var(--muted);font-size:11px;margin-top:-12px;margin-bottom:12px">'+qCur.rom+'</div>';opts=[qCur.kr,...wrongs.map(w=>w.kr)].sort(()=>Math.random()-.5);}
  else if(mode==='kr2jp'){qH='<div class="q-ques">'+qCur.kr+'</div>';opts=[qCur.jp,...wrongs.map(w=>w.jp)].sort(()=>Math.random()-.5);}
  else{qH='<div class="q-ques">🔊 음성을 듣고 한국어를 고르세요</div>';opts=[qCur.kr,...wrongs.map(w=>w.kr)].sort(()=>Math.random()-.5);setTimeout(()=>speak(qCur.jp),300);}
  qTotal++;
  const box=document.getElementById('quizBox');
  const correct=mode==='kr2jp'?qCur.jp:qCur.kr;
  box.innerHTML='<div class="q-prompt">문제 '+qTotal+' · 점수: '+qScore+'/'+(qTotal-1)+'</div>'+qH
    +'<div class="q-opts">'+opts.map(o=>'<button class="q-opt" onclick="checkA(this,\''+o.replace(/'/g,"\\'").replace(/"/g,'&quot;')+'\',' +'\''+correct.replace(/'/g,"\\'").replace(/"/g,'&quot;')+'\')">' +o+'</button>').join('')+'</div>'
    +'<div id="qfb"></div><button class="q-next" id="qnb" onclick="nextQ()">다음 문제 →</button>'
    +(mode==='audio'?'<br><button onclick="speak(\''+qCur.jp.replace(/'/g,"\\'")+'\',globalSpeed)" style="margin-top:8px;padding:5px 11px;border-radius:20px;border:1px solid var(--border);background:var(--paper);font-size:11px;cursor:pointer;">🔊 다시 듣기</button>':'');
}
function checkA(btn,sel,correct){
  if(qAns)return;qAns=true;
  const ok=sel===correct;if(ok)qScore++;
  document.querySelectorAll('.q-opt').forEach(b=>{b.disabled=true;if(b.textContent===correct)b.classList.add('correct');else if(b===btn&&!ok)b.classList.add('wrong');});
  const fb=document.getElementById('qfb');fb.className='q-fb '+(ok?'correct':'wrong');fb.textContent=ok?'🎉 정답!':'❌ 오답 — 정답: '+correct;
  document.getElementById('qnb').classList.add('on');
}

function switchTab(name,el){
  document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('tab-'+name).classList.add('active');el.classList.add('active');
}

renderPhrases();renderVocab();
</script>
</body>
</html>
